# Colócalo en tu repositorio como  .streamlit/config.toml
# Fija el tema editorial (papel cálido + acento) para que toda la app —incluidos
# los controles— combine, sin importar si el navegador está en modo claro u oscuro.
[theme]
base = "light"
backgroundColor = "#FAF8F3"
secondaryBackgroundColor = "#F3EFE6"
textColor = "#1C1B19"
primaryColor = "#1D6A75"
font = "sans serif"
